# Publish + deploy pipeline (RFC-002 Cycle G).
#
# Gated on CI: this workflow only runs after the `CI` workflow completes
# successfully on `main` (or a manual dispatch on main). It builds and pushes the
# three production images to GHCR, then — when the VPS secrets are configured —
# ships the compose triad to the VPS over SSH. No `push`/`pull_request` triggers:
# CI is the gate, and coupling is by the `workflows: ["CI"]` name below.
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

# Queue overlapping deploys instead of cancelling an in-flight one — a partially
# applied deploy must finish, not be interrupted mid `up -d`.
concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # Build/deploy only for a manual dispatch on main, or a CI run that concluded
    # successfully on main AND originated from this repository — not a fork. Without
    # the head_repository check, a fork PR whose branch is literally named `main`
    # would satisfy head_branch == 'main' and drive untrusted code through image
    # publishing and the SSH deploy (the classic workflow_run escalation).
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.head_repository.full_name == github.repository)
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: learny-backend
            context: ./backend
            target: runtime
          - name: learny-pdf-worker
            context: ./backend
            target: pdf-worker
          - name: learny-web
            context: ./frontend
            target: prod
          # Single-stage image (deploy/backup/Dockerfile) — no build target.
          - name: learny-backup
            context: ./deploy/backup
    steps:
      # Build the exact commit CI validated (head_sha on workflow_run), or the
      # dispatched ref's sha. Same expression drives the image tags below.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/augusto-dmh/${{ matrix.name }}:latest
            ghcr.io/augusto-dmh/${{ matrix.name }}:${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Same guard as the build job — a manual dispatch on main, or a successful CI
    # run on main that originated from this repository (never a fork).
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.head_repository.full_name == github.repository)
    permissions:
      contents: read
    steps:
      # Secrets cannot be referenced in an `if:` condition, so map them to env in a
      # step and gate the deploy steps on a boolean output. Absent secret → notice +
      # green exit while the image builds above still publish (eval.yml precedent).
      - name: Check for the VPS deploy secrets
        id: secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "::notice::VPS deploy secrets not configured — skipping deploy."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      # Check out the same commit the images were built from, to ship the matching
      # compose files.
      - uses: actions/checkout@v4
        if: steps.secrets.outputs.present == 'true'
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Write the SSH key
        if: steps.secrets.outputs.present == 'true'
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
      # Transfer only the compose triad — no secret material. Runtime env stays
      # VPS-local (secrets/*.env + /opt/learny/.env holding LEARNY_DOMAIN).
      - name: Copy the compose files to the VPS
        if: steps.secrets.outputs.present == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" "mkdir -p /opt/learny/deploy"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            docker-compose.yml docker-compose.prod.yml "$VPS_USER@$VPS_HOST:/opt/learny/"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            deploy/Caddyfile "$VPS_USER@$VPS_HOST:/opt/learny/deploy/Caddyfile"
      # Pull the freshly published images and restart the stack. The image tag is
      # injected inline (shell env beats compose `.env`); --no-build fails loudly if
      # an image is missing rather than building on the VPS; --wait fails on an
      # unhealthy service.
      - name: Pull images and restart the stack
        if: steps.secrets.outputs.present == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$VPS_USER@$VPS_HOST" \
            "cd /opt/learny && LEARNY_IMAGE_TAG=$DEPLOY_SHA docker compose -f docker-compose.yml -f docker-compose.prod.yml pull && LEARNY_IMAGE_TAG=$DEPLOY_SHA docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build --wait"
