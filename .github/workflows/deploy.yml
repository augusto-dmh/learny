# Publish + deploy pipeline (RFC-002 Cycle G).
#
# Gated on CI: this workflow only runs after the `CI` workflow completes
# successfully on `main` (or a manual dispatch on main). It builds and pushes the
# three production images to GHCR, then — when the VPS secrets are configured —
# ships the compose triad to the VPS over SSH. No `push`/`pull_request` triggers:
# CI is the gate, and coupling is by the `workflows: ["CI"]` name below.
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

# Queue overlapping deploys instead of cancelling an in-flight one — a partially
# applied deploy must finish, not be interrupted mid `up -d`.
concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # Build/deploy only for a manual dispatch on main, or a CI run that concluded
    # successfully on main. Any other event (failed CI, non-main branch) skips.
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: learny-backend
            context: ./backend
            target: runtime
          - name: learny-pdf-worker
            context: ./backend
            target: pdf-worker
          - name: learny-web
            context: ./frontend
            target: prod
    steps:
      # Build the exact commit CI validated (head_sha on workflow_run), or the
      # dispatched ref's sha. Same expression drives the image tags below.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/augusto-dmh/${{ matrix.name }}:latest
            ghcr.io/augusto-dmh/${{ matrix.name }}:${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
