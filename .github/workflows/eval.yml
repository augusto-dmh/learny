# Nightly generation evaluation (RFC-002 Cycle C, design §8).
#
# Runs the live smoke + LLM judge suite (`pytest -m "live and eval"`) against the
# real provider and uploads the results JSONL. Never runs on PRs — the offline
# suite (ci.yml) already asserts the deterministic citation invariants on every
# PR. The provider secret is optional: when `ANTHROPIC_API_KEY` is unset the job
# exits successfully with a notice, so a fork or a key-less repo stays green.
name: Nightly eval

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

# The job only reads the repository and writes an artifact; keep the token least-privilege.
permissions:
  contents: read

jobs:
  generation-eval:
    runs-on: ubuntu-latest
    # The publish step commits nightly results to the dedicated `eval-results`
    # branch, so this job needs write access; the workflow default stays read.
    permissions:
      contents: write
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: learny
          POSTGRES_PASSWORD: learny
          POSTGRES_DB: learny_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      # Secrets cannot be referenced in an `if:` condition, so map the secret to
      # an env var in a step and publish a boolean output the later steps gate on.
      # Absent secret → notice + success exit (the remaining steps are skipped).
      - name: Check for the provider secret
        id: secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::notice::ANTHROPIC_API_KEY is not configured — skipping the nightly generation eval."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: astral-sh/setup-uv@v7
        if: steps.secret.outputs.present == 'true'
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - name: Install Python
        if: steps.secret.outputs.present == 'true'
        working-directory: backend
        run: uv python install
      - name: Sync dependencies
        if: steps.secret.outputs.present == 'true'
        working-directory: backend
        run: uv sync --locked --all-extras
      - name: Run the live smoke + judge suite
        if: steps.secret.outputs.present == 'true'
        working-directory: backend
        run: uv run pytest -m "live and eval" -q
        env:
          LEARNY_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LEARNY_EVAL_MAX_CASES: "20"
          LEARNY_TEST_DATABASE_URL: postgresql+psycopg://learny:learny@localhost:5432/learny_test
      # The judge appends to evals/results/*.jsonl at the repo root; upload it so
      # git history / the artifact is the eval dashboard (research §5 — no UI).
      - name: Upload eval results
        if: steps.secret.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/results/*.jsonl
          if-no-files-found: warn
      # Persist the produced results to the dedicated `eval-results` branch so the
      # eval history outlives the 90-day artifact retention. Runs only when the key
      # is present (the suite ran) AND results actually exist; it never touches main
      # and never force-pushes over history. Runs from the repo root because the
      # judge writes to repo-root evals/results/, not backend/.
      - name: Publish eval results to the eval-results branch
        if: steps.secret.outputs.present == 'true'
        working-directory: .
        run: |
          if ! ls evals/results/*.jsonl >/dev/null 2>&1; then
            echo "::notice::No eval results to publish."
            exit 0
          fi
          mkdir -p /tmp/evalpub && cp evals/results/*.jsonl /tmp/evalpub/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin eval-results || true
          if git show-ref --verify --quiet refs/remotes/origin/eval-results; then
            git worktree add /tmp/eval-branch origin/eval-results
            cd /tmp/eval-branch && (git switch -c eval-results || git switch eval-results)
          else
            git worktree add --detach /tmp/eval-branch
            cd /tmp/eval-branch && git switch --orphan eval-results && (git rm -rf . >/dev/null 2>&1 || true)
          fi
          DEST="results/$(date -u +%Y-%m-%d)-${{ github.run_id }}"
          mkdir -p "$DEST" && cp /tmp/evalpub/*.jsonl "$DEST/"
          git add "$DEST"
          git commit -m "eval: nightly results ${{ github.run_id }}"
          # On a rejected push, rebase on the concurrent history and retry once;
          # a second failure fails the job. Never force-push.
          git push origin eval-results || (git pull --rebase origin eval-results && git push origin eval-results)
