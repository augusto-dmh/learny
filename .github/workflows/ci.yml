# CI gates for every PR and main push (RFC-002 Cycle A).
#
# Four parallel jobs mirroring the local gates:
#   backend-test — pytest against real Postgres(pgvector)+Redis service containers;
#                  the suite's own bootstrap applies Alembic migrations, so every
#                  run also proves migrations work from an empty database.
#   lint         — ruff check (the project's lint gate; formatting is not enforced).
#   frontend     — vitest, tsc, and the production Next.js build.
#   compose-smoke— builds the compose topology and boots it to a healthy API.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Every job only reads the repository; keep the workflow token least-privilege.
permissions:
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: learny
          POSTGRES_PASSWORD: learny
          POSTGRES_DB: learny_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      # The web-layer upload tests and the storage adapter integration tests run
      # end-to-end against a real S3 endpoint. GitHub service containers cannot
      # pass an image command (which minio/minio requires), so start the official
      # image — same pinned tag as the production overlay — as a plain container.
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=learny -e MINIO_ROOT_PASSWORD=learny-dev-secret \
            minio/minio:RELEASE.2024-10-13T13-34-11Z server /data
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv python install
      # Install the dev extra only — never the `pdf` extra: docling pulls torch
      # (~GB, model downloads) and its live conversion tests skip without it, so
      # CI stays offline and fast (AD-089 / CI parity). The docling-core mapping
      # tests run from the dev extra alone.
      - run: uv sync --locked --extra dev
      - name: Wait for MinIO to accept requests
        run: timeout 60 bash -c 'until curl -fsS http://localhost:9000/minio/health/live; do sleep 2; done'
      - run: uv run pytest -q
        env:
          LEARNY_TEST_DATABASE_URL: postgresql+psycopg://learny:learny@localhost:5432/learny_test
          LEARNY_REDIS_URL: redis://localhost:6379/0
          LEARNY_STORAGE_ENDPOINT: http://localhost:9000
          LEARNY_STORAGE_ACCESS_KEY: learny
          LEARNY_STORAGE_SECRET_KEY: learny-dev-secret

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: backend
          # Lint with the exact ruff the lockfile pins, not a floating latest.
          version-file: backend/uv.lock

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run
      - run: npx tsc --noEmit
      - run: npm run build

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # One build-and-boot step: `--wait` blocks until EVERY named service's
      # healthcheck passes (api /healthz, worker celery ping, web fetch probe,
      # db/redis/minio) and fails the job otherwise — a strictly stronger gate
      # than polling one endpoint. Plain compose build (no bake): api and worker
      # share an identical build definition, which bake dedupes into a single tag,
      # leaving the worker's expected image name missing at `up` time.
      #
      # worker-pdf is named out deliberately: its pdf-worker image bakes docling +
      # torch + models (multi-GB, minutes, network) — far beyond a smoke test. Its
      # topology is asserted at the YAML/config level in test_compose_topology.py;
      # building it is deferred to deploy.
      - name: Build and boot the full topology
        run: docker compose up -d --build --wait --wait-timeout 300 db redis minio api worker web
      # Prove the shipped backup image end-to-end (OPS-10) against the db/minio just
      # booted above: seed a marker row, back it up, destroy it, restore from the
      # latest dump, and assert the row returns. The backup service is profile-gated,
      # so it never joined the `up` set; `run --rm` drives it on demand. No offsite
      # vars are set, so this also asserts the local-only "offsite not configured"
      # notice.
      - name: Build the backup image
        run: docker compose --profile backup build backup
      - name: Seed a backup marker row
        run: |
          docker compose exec -T db psql -U learny -d learny -v ON_ERROR_STOP=1 \
            -c "CREATE TABLE backup_marker (id int PRIMARY KEY, note text);" \
            -c "INSERT INTO backup_marker (id, note) VALUES (1, 'roundtrip');"
      - name: Back up now (local-only, asserts the offsite notice)
        run: |
          out="$(docker compose --profile backup run --rm backup backup-now 2>&1)"
          echo "$out"
          echo "$out" | grep -qF "offsite not configured"
      - name: Destroy the seeded data
        run: |
          docker compose exec -T db psql -U learny -d learny -v ON_ERROR_STOP=1 \
            -c "DROP TABLE backup_marker;"
      - name: Restore from the latest dump
        run: docker compose --profile backup run --rm backup restore.sh --latest --yes
      - name: Assert the seeded row is back
        run: |
          docker compose exec -T db psql -U learny -d learny -tAc \
            "SELECT note FROM backup_marker WHERE id = 1;" | grep -qF roundtrip
      # The roundtrip above exercised the default (local-only) path. Now prove the
      # offsite branch (mc cp of the dump + mc mirror of the source bucket) actually
      # runs, by pointing the four LEARNY_BACKUP_REMOTE_* vars at the same MinIO and a
      # scratch offsite bucket. Seed one source object first so the mirror has something
      # to copy; the backup image ships mc, so drive it through that image.
      - name: Seed a source object for the offsite mirror
        run: |
          docker compose --profile backup run --rm --no-deps backup sh -c '
            mc alias set m http://minio:9000 learny learny-dev-secret &&
            mc mb --ignore-existing m/learny-sources &&
            echo offsite-mirror-probe | mc pipe m/learny-sources/offsite-probe.txt'
      - name: Back up now (offsite mode, asserts the branch runs)
        run: |
          out="$(docker compose --profile backup run --rm \
            -e LEARNY_BACKUP_REMOTE_ENDPOINT=http://minio:9000 \
            -e LEARNY_BACKUP_REMOTE_ACCESS_KEY=learny \
            -e LEARNY_BACKUP_REMOTE_SECRET_KEY=learny-dev-secret \
            -e LEARNY_BACKUP_REMOTE_BUCKET=learny-offsite-ci \
            backup backup-now 2>&1)"
          echo "$out"
          echo "$out" | grep -qF "offsite configured; copying dump and mirroring objects"
          if echo "$out" | grep -qF "offsite not configured"; then
            echo "offsite branch did not run (saw the local-only notice)"; exit 1
          fi
      - name: Assert the dump and mirrored objects landed offsite
        run: |
          docker compose --profile backup run --rm --no-deps backup sh -c '
            mc alias set m http://minio:9000 learny learny-dev-secret &&
            mc ls --recursive m/learny-offsite-ci/db/ | grep -qF .dump &&
            mc ls --recursive m/learny-offsite-ci/objects/ | grep -qF offsite-probe.txt'
      - name: Teardown (with logs on failure)
        if: always()
        run: |
          docker compose logs --tail 50
          docker compose down -v
