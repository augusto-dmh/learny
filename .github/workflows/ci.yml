# CI gates for every PR and main push (RFC-002 Cycle A).
#
# Four parallel jobs mirroring the local gates:
#   backend-test — pytest against real Postgres(pgvector)+Redis service containers;
#                  the suite's own bootstrap applies Alembic migrations, so every
#                  run also proves migrations work from an empty database.
#   lint         — ruff check (the project's lint gate; formatting is not enforced).
#   frontend     — vitest, tsc, and the production Next.js build.
#   compose-smoke— builds the compose topology and boots it to a healthy API.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: learny
          POSTGRES_PASSWORD: learny
          POSTGRES_DB: learny_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv python install
      - run: uv sync --locked --all-extras
      - run: uv run pytest -q
        env:
          LEARNY_TEST_DATABASE_URL: postgresql+psycopg://learny:learny@localhost:5432/learny_test
          LEARNY_REDIS_URL: redis://localhost:6379/0

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v4
        with:
          src: backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run
      - run: npx tsc --noEmit
      - run: npm run build

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/bake-action@v6
        with:
          source: .
          files: docker-compose.yml
          load: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
      - run: docker compose up -d --no-build
      - name: Wait for the API to become healthy
        run: |
          timeout 120 bash -c 'until curl -fsS http://localhost:8000/healthz; do sleep 3; done'
      - name: Teardown (with logs on failure)
        if: always()
        run: |
          docker compose logs --tail 50
          docker compose down -v
