# Production-like overlay (AD-042, TDD Phase 10). Apply explicitly over the base:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# It does NOT auto-load (so it never affects local dev) and it overrides only the
# prod-specific keys: restart policies, pinned images (no floating :latest), prod
# env, env_file-injected secrets (NFR-SEC-003), and production run commands. TLS
# termination and a reverse proxy sit in FRONT of `web`/`api` and are an external
# concern (TDD open question #10) — deliberately not embedded here.
#
# Secrets: create the referenced files under ./secrets/ (git-ignored) from the
# *.env.production.example templates. `environment:` here holds only non-secret
# config; every credential arrives via env_file.

services:
  db:
    restart: unless-stopped
    # pgvector/pgvector:pg16 (from base) is an explicit tag; operators may re-pin
    # to a digest for full reproducibility.
    env_file:
      - path: ./secrets/db.env
        required: true

  redis:
    restart: unless-stopped
    image: redis:7.4-alpine

  minio:
    restart: unless-stopped
    # Pin to a vetted MinIO release (never :latest). Operators bump this tag
    # deliberately after testing.
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    env_file:
      - path: ./secrets/minio.env
        required: true

  api:
    restart: unless-stopped
    image: ghcr.io/augusto-dmh/learny-backend:${LEARNY_IMAGE_TAG:-latest}
    environment:
      LEARNY_ENVIRONMENT: production
      LEARNY_DEBUG: "false"
      LEARNY_SESSION_COOKIE_SECURE: "true"
      LEARNY_LOG_FORMAT: json
    env_file:
      - path: ./secrets/api.env
        required: true
    command: >-
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${LEARNY_API_WORKERS:-2}"

  worker:
    restart: unless-stopped
    image: ghcr.io/augusto-dmh/learny-backend:${LEARNY_IMAGE_TAG:-latest}
    environment:
      LEARNY_ENVIRONMENT: production
      LEARNY_LOG_FORMAT: json
    env_file:
      - path: ./secrets/worker.env
        required: true

  worker-pdf:
    restart: unless-stopped
    image: ghcr.io/augusto-dmh/learny-pdf-worker:${LEARNY_IMAGE_TAG:-latest}
    environment:
      LEARNY_ENVIRONMENT: production
      LEARNY_LOG_FORMAT: json
    env_file:
      - path: ./secrets/worker.env
        required: true

  # Scheduled backups (RFC-003 Cycle A): a crond sidecar that dumps PostgreSQL and
  # (when offsite is configured) mirrors the source bucket. No host port — it only
  # reaches db/minio over the compose network. Credentials reuse db.env/minio.env
  # and add backup.env (offsite + heartbeat); dumps persist in backup_data. See
  # docs/ops/backups.md.
  backup:
    restart: unless-stopped
    image: ghcr.io/augusto-dmh/learny-backup:${LEARNY_IMAGE_TAG:-latest}
    env_file:
      - path: ./secrets/db.env
        required: true
      - path: ./secrets/minio.env
        required: true
      - path: ./secrets/backup.env
        required: true
    volumes:
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    restart: unless-stopped
    image: ghcr.io/augusto-dmh/learny-web:${LEARNY_IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    # The prod image serves the built Next.js standalone server (see the prod
    # stage in frontend/Dockerfile), never `next dev`.
    command: ["node", "server.js"]

  # Public TLS edge (ADR-0017/AD-093): the ONLY host-exposed service in prod.
  # Caddy terminates TLS with automatic Let's Encrypt certs (persisted in
  # caddy_data so restarts reuse them) and reverse-proxies to the Next.js
  # same-origin proxy at web:3000 — api never gets a host port or a Caddy route.
  caddy:
    restart: unless-stopped
    image: caddy:2.10-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      LEARNY_DOMAIN: ${LEARNY_DOMAIN:?LEARNY_DOMAIN must be set}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
  backup_data:
