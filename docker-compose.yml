# Learny local topology (FR-SCAF-001, AD-008).
# Six services: api, web, db (postgres+pgvector), redis, worker (Celery), minio.
# Health: db/redis/minio via native checks; api via /healthz; worker via celery ping.
# Secrets are placeholders for local only — production injects via env (NFR-SEC-003).

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: learny
      POSTGRES_PASSWORD: learny
      POSTGRES_DB: learny
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learny -d learny"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: learny
      MINIO_ROOT_PASSWORD: learny-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      LEARNY_DATABASE_URL: postgresql+psycopg://learny:learny@db:5432/learny
      LEARNY_REDIS_URL: redis://redis:6379/0
      LEARNY_SESSION_COOKIE_SECURE: "false"
    # Apply migrations, then serve. (Phase C wires the auth routers onto this app.)
    command: >-
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      LEARNY_DATABASE_URL: postgresql+psycopg://learny:learny@db:5432/learny
      LEARNY_REDIS_URL: redis://redis:6379/0
    command: celery -A app.worker.celery_app:celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "celery", "-A", "app.worker.celery_app:celery_app", "inspect", "ping"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 20s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      LEARNY_API_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
  minio_data:
