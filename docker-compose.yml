# Learny service topology (FR-SCAF-001, AD-008/AD-042).
# Six services: api, web, db (postgres+pgvector), redis, worker (Celery), minio.
# Health: db/redis/minio via native checks; api via /healthz; worker via celery ping.
#
# This base file is the single source of topology truth and is deliberately kept
# free of host-published infra ports and of secrets:
#   - Local dev: `docker-compose.override.yml` (auto-loaded) adds db/redis/minio
#     host ports and dev credentials.
#   - Production: `docker-compose.prod.yml` (explicit `-f`) adds restart policies,
#     pinned images, prod env, and env_file-injected secrets (NFR-SEC-003).
# So `docker compose up` stays a local dev run; `docker compose -f docker-compose.yml
# -f docker-compose.prod.yml up -d` is the production-like run.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: learny
      POSTGRES_DB: learny
      # POSTGRES_PASSWORD comes from the override (local) or env_file (prod).
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learny -d learny"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    # MINIO_ROOT_USER/PASSWORD come from the override (local) or env_file (prod).
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      LEARNY_REDIS_URL: redis://redis:6379/0
      LEARNY_SESSION_COOKIE_SECURE: "false"
      LEARNY_STORAGE_ENDPOINT: http://minio:9000
      LEARNY_STORAGE_BUCKET: learny-sources
      LEARNY_STORAGE_REGION: us-east-1
      # LEARNY_DATABASE_URL + storage access/secret keys come from the override
      # (local) or env_file (prod) — never inline in this base (NFR-SEC-003).
    # Apply migrations, then serve.
    command: >-
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      LEARNY_REDIS_URL: redis://redis:6379/0
      # LEARNY_DATABASE_URL comes from the override (local) or env_file (prod).
    command: celery -A app.worker.celery_app:celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "celery", "-A", "app.worker.celery_app:celery_app", "inspect", "ping"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 20s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      LEARNY_API_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    # node:slim has no curl; Node >=20 ships global fetch, so probe with node (Gap-1).
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  db_data:
  minio_data:
